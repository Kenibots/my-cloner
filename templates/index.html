<!DOCTYPE html>
<html>
<head>
    <title>Keni Cloner Panel</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { background: #000; color: #0f0; font-family: 'Courier New', monospace; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .panel { border: 2px solid #0f0; padding: 25px; box-shadow: 0 0 20px #0f0; border-radius: 15px; width: 90%; max-width: 400px; text-align: center; }
        input { width: 100%; padding: 12px; margin: 10px 0; background: #111; border: 1px solid #0f0; color: #0ff; border-radius: 5px; box-sizing: border-box; }
        button { width: 100%; padding: 15px; background: #0f0; color: #000; border: none; cursor: pointer; font-weight: bold; font-size: 16px; border-radius: 5px; margin-top: 10px; }
        button:hover { background: #0c0; box-shadow: 0 0 10px #0f0; }
        h2 { text-decoration: underline; margin-bottom: 20px; }
        #msg { margin-top: 15px; color: #ff0; font-size: 14px; }
    </style>
</head>
<body>
    <div class="panel">
        <h2>KENI CLONER 1.0</h2>
        <input type="text" id="token" placeholder="Бот Токені">
        <input type="text" id="source" placeholder="Source Server ID">
        <input type="text" id="target" placeholder="Target Server ID">
        <button onclick="startClone()">КӨШІРУДІ БАСТАУ</button>
        <p id="msg"></p>
    </div>

    <script>
        function startClone() {
            const msg = document.getElementById('msg');
            msg.innerText = "Күте тұрыңыз, бот қосылуда...";
            const data = {
                token: document.getElementById('token').value,
                source: document.getElementById('source').value,
                target: document.getElementById('target').value
            };
            fetch('/clone', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(data)
            }).then(res => res.json()).then(d => {
                msg.innerText = d.message;
            }).catch(err => {
                msg.innerText = "Қате орын алды. Токенді тексеріңіз.";
            });
        }
    </script>
</body>
</html>
